version: '3.8'

services:
  # 1️⃣ 카운터 (API 서버)
  api_server:
    build:
      context: ./api_server
      dockerfile: Dockerfile
    container_name: api_server
    ports:
      - "8000:8000"  # 외부에서 8000번으로 접속하면 카운터로 연결
    volumes:
      - ./api_server:/app
      - ./api_server/uploads:/app/uploads
      - ./api_server/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./sql_app.db
      - AI_SERVER_URL=http://ai_server:8001/analyze/document
    restart: always
    networks:
      - phishing_network

  # 2️⃣ 주방 (AI 서버)
  ai_server:
    build:
      context: ./ai_server
      dockerfile: Dockerfile
    container_name: ai_server
    ports:
      - "8001:8001"  # 외부에서 8001번으로 접속하면 주방으로 연결
    volumes:
      - ./ai_server:/app
      - ./ai_server/data:/app/data
    restart: always
    networks:
      - phishing_network

networks:
  phishing_network:
    driver: bridge